<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.metadata.Subject}}</title>
  <style>
    body {
      margin: 0;
      padding: 32px 16px;
      background-color: #f0f0f0;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      -webkit-text-size-adjust: 100%;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      background-color: #ffffff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 40px 48px 48px;
    }

    @media (max-width: 600px) {
      .container { padding: 28px 24px 36px; }
    }

    h1, h2, h3, h4, h5, h6 {
      color: #111111;
      font-weight: 600;
      line-height: 1.25;
      margin: 2em 0 0.5em;
    }
    h1 { font-size: 1.65em; margin-top: 0; }
    h2 { font-size: 1.3em; }
    h3 { font-size: 1.1em; }
    h4, h5, h6 { font-size: 1em; }

    p { margin: 0 0 1em; }

    a { color: #1a5cb8; text-decoration: underline; }
    a:hover { color: #0f3f80; }

    strong { font-weight: 600; }
    em { font-style: italic; }

    hr {
      border: none;
      border-top: 1px solid #ddd;
      margin: 2em 0;
    }

    blockquote {
      margin: 1em 0;
      padding: 0.5em 0 0.5em 1em;
      border-left: 3px solid #aaa;
      color: #555;
    }
    blockquote p:last-child { margin-bottom: 0; }

    code {
      font-family: "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 0.875em;
      background-color: #f0f0f0;
      color: #2a2a2a;
      padding: 0.15em 0.4em;
      border-radius: 3px;
    }

    pre {
      background-color: #f0f0f0;
      color: #2a2a2a;
      padding: 1em;
      border-radius: 4px;
      border: 1px solid #ddd;
      overflow-x: auto;
      margin: 0 0 1em;
    }
    pre code { background: none; padding: 0; border-radius: 0; font-size: 0.85em; }

    ul, ol {
      margin: 0 0 1em;
      padding-left: 1.75em;
    }
    li { margin-bottom: 0.25em; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9em;
      margin-bottom: 1em;
    }
    th, td {
      text-align: left;
      padding: 0.4em 0.75em;
      border: 1px solid #ddd;
    }
    thead tr { background-color: #f5f5f5; }
    th { font-weight: 600; color: #111; }
    tr:nth-child(even) td { background-color: #fafafa; }

    img { max-width: 100%; height: auto; border-radius: 4px; }

    small { color: #666; font-size: 0.875em; }

    .footer {
      max-width: 560px;
      margin: 1.5em auto 0;
      padding: 0 4px;
      text-align: center;
      color: #888;
      font-size: 0.8em;
      line-height: 1.6;
    }
    .footer a { color: #888; }
    .footer a:hover { color: #555; }
  </style>
</head>
<body>
  <div class="footer">
    {{if .previewURL}}<p><a href="{{.previewURL}}">Preview in your Browser</a></p>{{end}}
    </p>
  </div>
  <div class="container">
    {{.html}}
  </div>
  {{if .unsubscribeURL}}
  <div class="footer">
    <p>This mail was sent to you because you subscribed to our newsletter.</p>
    <p>
      <a href="{{.unsubscribeURL}}">Unsubscribe from all emails</a>
      {{if .preferencesURL}} &nbsp;&middot;&nbsp; <a href="{{.preferencesURL}}">Manage your topic preferences</a>{{end}}
    </p>
  </div>
  {{end}}
</body>
</html>
