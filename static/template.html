<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{.metadata.Subject}}</title>
  <style>
{{.theme}}

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-body);
      font-size: var(--font-size-base);
      line-height: 1.7;
      padding: var(--spacing-page-v) var(--spacing-page-h);
    }

    @media (min-width: 640px) {
      body { padding-left: var(--spacing-page-h-wide); padding-right: var(--spacing-page-h-wide); }
    }

    .container {
      max-width: var(--content-width);
      margin-inline: auto;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: var(--font-heading);
      color: var(--color-text-heading);
      line-height: 1.25;
      margin-top: calc(var(--gap-base) * 2);
      margin-bottom: var(--gap-base);
    }

    p { margin-bottom: var(--gap-base); }

    a {
      color: var(--color-accent);
      text-decoration: underline;
    }

    a:hover { color: var(--color-accent-hover); }

    hr {
      border: none;
      border-top: 1px solid var(--color-border);
      margin: calc(var(--gap-base) * 2) 0;
    }

    blockquote {
      border-left: 3px solid var(--color-accent);
      padding-left: var(--gap-base);
      color: var(--color-text-muted);
      margin: var(--gap-base) 0;
    }

    code {
      font-family: var(--font-mono);
      background-color: var(--color-code-bg);
      color: var(--color-code-text);
      padding: 0.1em 0.35em;
      border-radius: var(--radius-sm);
      font-size: 0.875em;
    }

    pre {
      background-color: var(--color-code-bg);
      color: var(--color-code-text);
      font-family: var(--font-mono);
      padding: var(--gap-base);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-border);
      overflow-x: auto;
      margin-bottom: var(--gap-base);
    }

    pre code { background: none; padding: 0; border-radius: 0; }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: var(--gap-base);
      font-size: 0.9em;
    }

    thead tr { background-color: var(--color-surface); }

    th, td {
      text-align: left;
      padding: calc(var(--gap-base) * 0.5) var(--gap-base);
      border: 1px solid var(--color-border);
    }

    th { color: var(--color-text-heading); }

    tr:nth-child(even) { background-color: var(--color-surface); }

    ul, ol {
      padding-left: calc(var(--gap-base) * 1.5);
      margin-bottom: var(--gap-base);
    }

    li { margin-bottom: calc(var(--gap-base) * 0.25); }

    img {
      max-width: 100%;
      height: auto;
      border-radius: var(--radius-md);
    }

    .tag {
      display: inline-block;
      background-color: var(--color-tag-bg);
      color: var(--color-tag-text);
      padding: 0.15em 0.5em;
      border-radius: var(--radius-sm);
      font-size: 0.8em;
    }

    small, .muted { color: var(--color-text-muted); }
    .dim { color: var(--color-text-dim); }
  </style>
</head>
<body>
  <div class="container">
    {{.html}}
  </div>
</body>
</html>
